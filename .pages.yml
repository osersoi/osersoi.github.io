# Configuration des médias
media:
  input: src/images/blog
  output: /images/blog

# Collections
content:
  - name: posts
    label: Articles de blog
    path: src/posts
    type: collection
    filename: "{{ fields.slug }}.md"
    fields:
      - name: title
        label: Titre
        type: string
        required: true
      - name: slug
        label: URL (slug)
        type: string
        required: true
      - name: date
        label: Date de publication
        type: date
        required: true
      - name: description
        label: Description courte
        type: string
      - name: image
        label: Image principale
        type: image
      - name: body
        label: Contenu de l'article
        type: rich-text


  - name: site
    label: Paramètres du site
    path: src/_data/site.json
    type: file
    fields:
      - name: name
        label: Nom du site
        type: string
      - name: tagline
        label: Slogan
        type: string
      - name: subtitle
        label: Sous-titre
        type: string
      - name: description
        label: Description SEO
        type: string
      - name: phone
        label: Téléphone
        type: string
      - name: email
        label: Email
        type: string
      - name: address
        label: Adresse
        type: string
      - name: horaires
        label: Horaires
        type: string

  - name: tarifs
    label: Tarifs
    path: src/_data/tarifs.json
    type: file
    fields:
      - name: promo_end
        label: Fin de la promo
        type: string
      - name: items
        label: Tarifs
        type: object
        list: true
        fields:
          - name: badge
            label: Badge
            type: string
          - name: title
            label: Titre
            type: string
          - name: price
            label: Prix
            type: string
          - name: price_old
            label: Ancien prix
            type: string
          - name: promo
            label: Promo
            type: string
          - name: duration
            label: Durée
            type: string
          - name: featured
            label: Mis en avant
            type: boolean
          - name: details
            label: Détails
            type: string
            list: true
  - name: accompagnement
    label: Accompagnement
    path: src/_data/accompagnement.json
    type: file
    fields:
      - name: genres
        label: Catégories d'Accompagnement
        type: object
        list: true
        fields:
          - {label: "ID", name: "id", type: "string", required: true, hint: "Unique identifier (e.g., adultes, enfants)"}
          - {label: "Label de Section", name: "section_label", type: "string"}
          - {label: "Titre de Section", name: "section_title", type: "string"}
          - {label: "Introduction de Section", name: "section_intro", type: "string", widget: "textarea"}
          - name: cards
            label: Cartes
            type: object
            list: true
            fields:
              - {label: "Icône", name: "icon", type: "string", hint: "Emoji ou chemin vers une image"}
              - {label: "Titre de la Carte", name: "title", type: "string"}
              - {label: "Description de la Carte", name: "description", type: "string", widget: "textarea"}

  - name: a_propos
    label: À Propos
    path: src/_data/a_propos.json
    type: file
    fields:
      - {label: "Label de Section", name: "section_label", type: "string"}
      - {label: "Suffixe de Titre", name: "title_suffix", type: "string", hint: "Ex: '. Un parcours riche...'"}
      - {label: "Introduction", name: "intro", type: "string", widget: "textarea"}
      - name: content_paragraphs
        label: Paragraphes de Contenu
        type: string
        list: true
        widget: "textarea"
        hint: "Supporte le Markdown pour la mise en forme (ex: **texte**)"
      - {label: "Titre des Certifications", name: "certifications_title", type: "string"}
      - name: certifications
        label: Certifications
        type: string
        list: true

  - name: methode
    label: Méthode
    path: src/_data/methode.json
    type: file
    fields:
      - {label: "Label de Section", name: "section_label", type: "string"}
      - {label: "Titre", name: "title", type: "string"}
      - {label: "Introduction", name: "intro", type: "string", widget: "textarea"}
      - name: items
        label: Éléments de Méthode
        type: object
        list: true
        fields:
          - {label: "Titre de l'Élément", name: "title", type: "string"}
          - {label: "Description", name: "description", type: "string", widget: "textarea"}
          - name: details
            label: Détails
            type: string
            list: true
      - {label: "Titre du Résultat", name: "result_title", type: "string"}
      - {label: "Contenu du Résultat", type: "string", name: "result_content", widget: "textarea", hint: "Supporte le Markdown pour la mise en forme (ex: **texte**)"}
  - name: mentions
    label: Mentions légales
    path: src/mentions-legales.njk
    type: file

  - name: confidentialite
    label: Politique de confidentialité
    path: src/confidentialite.njk
    type: file

